<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <script>
    // GitHub Pages не поддерживает SPA роутинг, поэтому перенаправляем все 404 на index.html
    // Сохраняем путь и query параметры для клиентского роутера
    var path = window.location.pathname;
    var search = window.location.search;
    var hash = window.location.hash;
    
    // Базовый путь репозитория
    var base = '/hh-frontend';
    
    // Убираем базовый путь из pathname, чтобы не было дублирования
    if (path.startsWith(base)) {
      path = path.substring(base.length);
    }
    
    // Формируем правильный путь для редиректа
    var redirectPath = base + '/index.html' + path + search + hash;
    
    // Перенаправляем на index.html с сохранением пути
    window.location.replace(redirectPath);
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
